services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: zimdugo-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: zimdugo
      POSTGRES_USER: zimdugo
      POSTGRES_PASSWORD: zimdugo
    volumes:
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro

  redis:
    image: redis:7-alpine
    container_name: zimdugo-redis
    ports:
      - "6379:6379"

  elasticsearch:
    build:
      context: .
      dockerfile: ./docker/elasticsearch/Dockerfile
    image: zimdugo-elasticsearch:9.2.6
    container_name: zimdugo-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      xpack.security.enrollment.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"

volumes:
  elasticsearch-data:
