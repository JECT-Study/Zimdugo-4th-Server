services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: zimdugo-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: zimdugo
      POSTGRES_USER: zimdugo
      POSTGRES_PASSWORD: zimdugo
    volumes:
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro

  redis:
    image: redis:7-alpine
    container_name: zimdugo-redis
    ports:
      - "6379:6379"
