spring:
  application:
    name: zimdugo-be

  servlet:
    multipart:
      max-file-size: ${ADMIN_NOTICE_IMAGE_MAX_FILE_SIZE:10MB}
      max-request-size: ${ADMIN_NOTICE_IMAGE_MAX_REQUEST_SIZE:105MB}

  jpa:
    open-in-view: false

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:dummy-google-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:dummy-google-client-secret}
            scope:
              - profile
              - email

          naver:
            client-id: ${NAVER_CLIENT_ID:dummy-naver-client-id}
            client-secret: ${NAVER_CLIENT_SECRET:dummy-naver-client-secret}
            client-name: Naver
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - name
              - email
              - nickname
              - profile_image

          kakao:
            client-id: ${KAKAO_CLIENT_ID:dummy-kakao-client-id}
            client-secret: ${KAKAO_CLIENT_SECRET:dummy-kakao-client-secret}
            client-authentication-method: client_secret_post
            client-name: Kakao
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - profile_nickname
              - profile_image
              # - account_email

        provider:
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

jwt:
  secret: ${JWT_SECRET:change-me-local-jwt-secret-key-32bytes!}
  access-token-expiration-seconds: 900
  refresh-token-expiration-seconds: 2592000

kakao:
  local:
    base-url: https://dapi.kakao.com
    rest-api-key: ${KAKAO_CLIENT_ID:dummy-kakao-rest-api-key}
    connect-timeout-millis: 1500
    read-timeout-millis: 2000

springdoc:
  swagger-ui:
    display-request-duration: true
  paths-to-exclude:
    - /admin/**

storage:
  s3:
    region: ${AWS_REGION:ap-northeast-2}
    bucket: ${AWS_S3_BUCKET}
    public-base-url: ${AWS_CLOUDFRONT_PUBLIC_BASE_URL}
    upload-expiration-minutes: ${AWS_S3_UPLOAD_EXPIRE_MINUTES:10}
    max-upload-bytes: ${AWS_S3_MAX_UPLOAD_BYTES:10485760}

admin:
  notice-image:
    max-pixel-count: ${ADMIN_NOTICE_IMAGE_MAX_PIXEL_COUNT:50000000}

management:
  endpoint:
    health:
      group:
        readiness:
          include: readinessState,lockerSuggestIndex,db,redis,elasticsearch

translation:
  gemini:
    base-url: ${GEMINI_API_BASE_URL:https://generativelanguage.googleapis.com}
    api-key: ${GEMINI_API_KEY:}
    model: ${GEMINI_TRANSLATION_MODEL:gemini-2.5-flash-lite}
    connect-timeout-millis: ${GEMINI_CONNECT_TIMEOUT_MILLIS:1500}
    read-timeout-millis: ${GEMINI_READ_TIMEOUT_MILLIS:30000}
