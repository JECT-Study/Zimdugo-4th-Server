spring:
  application:
    name: zimdugo-be

  profiles:
    active: local

  jpa:
    open-in-view: false

  boot:
    admin:
      client:
        url: http://localhost:8080
        auto-deregistration: false

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:dummy-google-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:dummy-google-client-secret}
            scope:
              - profile
              - email

          naver:
            client-id: ${NAVER_CLIENT_ID:dummy-naver-client-id}
            client-secret: ${NAVER_CLIENT_SECRET:dummy-naver-client-secret}
            client-name: Naver
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - name
              - email
              - nickname
              - profile_image

          kakao:
            client-id: ${KAKAO_CLIENT_ID:dummy-kakao-client-id}
            client-secret: ${KAKAO_CLIENT_SECRET:dummy-kakao-client-secret}
            client-authentication-method: client_secret_post
            client-name: Kakao
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - profile_nickname
              - profile_image
              # - account_email

        provider:
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

jwt:
  secret: ${JWT_SECRET:change-me-local-jwt-secret-key-32bytes!}
  access-token-expiration-seconds: 900
  refresh-token-expiration-seconds: 2592000

kakao:
  local:
    base-url: https://dapi.kakao.com
    rest-api-key: ${KAKAO_CLIENT_ID:dummy-kakao-rest-api-key}
    connect-timeout-millis: 1500
    read-timeout-millis: 2000

springdoc:
  swagger-ui:
    display-request-duration: true
  paths-to-exclude:
    - /admin/**

auth:
  callback:
    frontend-base-url: http://localhost:3000
    allowed-origins: http://localhost:3000,http://localhost:5173
  cookie:
    refresh:
      secure: false
      same-site: Strict

storage:
  s3:
    region: ${AWS_REGION:ap-northeast-2}
    bucket: ${AWS_S3_BUCKET}
    public-base-url: ${AWS_CLOUDFRONT_PUBLIC_BASE_URL}
    upload-expiration-minutes: ${AWS_S3_UPLOAD_EXPIRE_MINUTES:10}

---
spring:
  config:
    activate:
      on-profile: local
    import: optional:classpath:application-private.yaml

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:zimdugo}
    username: ${DB_USERNAME:zimdugo}
    password: ${DB_PASSWORD:zimdugo}
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

management:
  endpoints:
    web:
      exposure:
        include: "*"

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace

auth:
  callback:
    frontend-base-url: http://localhost:3000
    allowed-origins: http://localhost:3000,http://localhost:5173
  cookie:
    refresh:
      secure: false
      same-site: Strict

storage:
  s3:
    bucket: ${AWS_S3_BUCKET:dummy-local-bucket}
    public-base-url: ${AWS_CLOUDFRONT_PUBLIC_BASE_URL:https://dummy-local.example.com}

---
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}

  elasticsearch:
    uris: ${ELASTICSEARCH_URIS}

  jpa:
    hibernate:
      ddl-auto: create

server:
  forward-headers-strategy: framework

auth:
  callback:
    frontend-base-url: https://zimdugo.com
    allowed-origins: https://zimdugo.com,https://www.zimdugo.com,https://zimdugo-web.vercel.app
  cookie:
    refresh:
      secure: true
      same-site: None

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
