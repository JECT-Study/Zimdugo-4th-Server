<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout(title, content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title th:replace="${title}">Zimdugo Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Noto Sans KR', -apple-system, sans-serif;
            background: #f5f5f5;
            color: #1a1a1a;
            min-height: 100vh;
            display: flex;
        }

        /* ── Sidebar ── */
        .sidebar {
            width: 240px;
            background: #fff;
            border-right: 1px solid #e5e5e5;
            position: fixed;
            top: 0;
            bottom: 0;
            left: 0;
            display: flex;
            flex-direction: column;
            padding: 1.5rem 0;
        }

        .sidebar-brand {
            padding: 0 1.25rem 1.5rem;
            border-bottom: 1px solid #e5e5e5;
            font-size: 1.1rem;
            font-weight: 700;
            color: #1a1a1a;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
        }

        .sidebar-brand i { color: #4f46e5; }

        .sidebar-label {
            padding: 1.25rem 1.25rem 0.5rem;
            font-size: 0.7rem;
            font-weight: 600;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .sidebar-menu { list-style: none; padding: 0 0.75rem; }

        .sidebar-menu-item a {
            display: flex;
            align-items: center;
            gap: 0.65rem;
            padding: 0.6rem 0.75rem;
            font-size: 0.875rem;
            font-weight: 500;
            color: #555;
            text-decoration: none;
            border-radius: 6px;
            transition: background 0.15s, color 0.15s;
        }

        .sidebar-menu-item a:hover {
            background: #f5f5f5;
            color: #1a1a1a;
        }

        .sidebar-brand:focus-visible,
        .sidebar-menu-item a:focus-visible,
        .btn:focus-visible {
            outline: 3px solid rgba(79, 70, 229, 0.28);
            outline-offset: 2px;
        }

        .sidebar-menu-item.active a {
            background: #4f46e5;
            color: #fff;
        }

        .sidebar-menu-item a i { width: 18px; text-align: center; font-size: 0.85rem; }

        /* ── Main ── */
        .main-wrapper {
            margin-left: 240px;
            flex: 1;
            padding: 2rem 2.5rem;
            min-height: 100vh;
        }

        /* ── Common ── */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .page-header h1 {
            font-size: 1.4rem;
            font-weight: 700;
            color: #1a1a1a;
        }

        .page-header .type-label {
            font-size: 0.75rem;
            font-weight: 600;
            color: #888;
            margin-bottom: 0.25rem;
        }

        .card {
            background: #fff;
            border: 1px solid #e5e5e5;
            border-radius: 8px;
            padding: 1.5rem;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 0.2rem 0.55rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 700;
            white-space: nowrap;
        }
        .status-submitted { background: #f3f4f6; color: #4b5563; }
        .status-translation-required { background: #fff7ed; color: #c2410c; }
        .status-ready-for-approval { background: #eef2ff; color: #4338ca; }
        .status-approved { background: #ecfdf5; color: #047857; }
        .status-rejected { background: #fef2f2; color: #b91c1c; }

        /* ── Buttons ── */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.5rem 1rem;
            font-size: 0.85rem;
            font-weight: 600;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.15s;
            font-family: inherit;
        }

        .btn-primary {
            background: #4f46e5;
            color: #fff;
        }
        .btn-primary:hover { background: #4338ca; }

        .btn-secondary {
            background: #fff;
            color: #555;
            border: 1px solid #d4d4d4;
        }
        .btn-secondary:hover { background: #f5f5f5; }

        .btn-danger {
            background: #fff;
            color: #dc2626;
            border: 1px solid #fca5a5;
        }
        .btn-danger:hover { background: #fef2f2; }

        .btn-sm {
            padding: 0.35rem 0.65rem;
            font-size: 0.8rem;
        }

        @media (max-width: 900px) {
            body { display: block; }

            .sidebar {
                width: 100%;
                position: static;
                padding: 1rem;
                border-right: 0;
                border-bottom: 1px solid #e5e5e5;
            }

            .sidebar-brand { padding: 0 0 1rem; }
            .sidebar-label { padding: 1rem 0 0.4rem; }
            .sidebar-menu { display: flex; flex-wrap: wrap; gap: 0.35rem; padding: 0; }
            .sidebar-footer { padding: 1rem 0 0 !important; }
            .sidebar-footer .btn { width: auto !important; }
            .main-wrapper { margin-left: 0; padding: 1.5rem 1rem 2.5rem; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <a class="sidebar-brand" th:href="@{/admin}">
            <i class="fa-solid fa-gear"></i>
            Zimdugo Admin
        </a>
        <div class="sidebar-label">콘텐츠 관리</div>
        <ul class="sidebar-menu">
            <li class="sidebar-menu-item" th:classappend="${activeMenu == 'notice'} ? 'active'">
                <a th:href="@{/admin/documents(type='NOTICE')}">
                    <i class="fa-solid fa-bullhorn"></i> 공지사항
                </a>
            </li>
            <li class="sidebar-menu-item" th:classappend="${activeMenu == 'terms'} ? 'active'">
                <a th:href="@{/admin/documents(type='TERMS')}">
                    <i class="fa-solid fa-file-lines"></i> 이용 약관
                </a>
            </li>
            <li class="sidebar-menu-item" th:classappend="${activeMenu == 'privacy'} ? 'active'">
                <a th:href="@{/admin/documents(type='PRIVACY')}">
                    <i class="fa-solid fa-shield-halved"></i> 개인정보처리방침
                </a>
            </li>
        </ul>
        <div class="sidebar-label">물품보관함 관리</div>
        <ul class="sidebar-menu">
            <li class="sidebar-menu-item" th:classappend="${activeMenu == 'lockers'} ? 'active'">
                <a th:href="@{/admin/lockers}">
                    <i class="fa-solid fa-box-archive"></i> 보관함 데이터
                </a>
            </li>
        </ul>
        <div class="sidebar-label">제보 관리</div>
        <ul class="sidebar-menu">
            <li class="sidebar-menu-item" th:classappend="${activeMenu == 'locker-reports'} ? 'active'">
                <a th:href="@{/admin/locker-reports}">
                    <i class="fa-solid fa-location-dot"></i> 보관함 제보
                </a>
            </li>
        </ul>
        <div class="sidebar-footer" style="margin-top: auto; padding: 1rem 0.75rem 0; border-top: 1px solid #e5e5e5;">
            <form th:action="@{/admin/logout}" method="post">
                <button type="submit" class="btn btn-secondary btn-sm" style="width: 100%; justify-content: center;">
                    <i class="fa-solid fa-arrow-right-from-bracket"></i> 로그아웃
                </button>
            </form>
        </div>
    </div>

    <div class="main-wrapper">
        <div th:replace="${content}"></div>
    </div>

</body>
</html>
