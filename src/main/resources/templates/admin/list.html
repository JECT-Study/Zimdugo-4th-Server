<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{admin/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>문서 목록</title>
</head>
<body>
<main>
    <style>
        .admin-table {
            width: 100%;
            border-collapse: collapse;
        }

        .admin-table th {
            padding: 0.75rem 1rem;
            font-size: 0.75rem;
            font-weight: 600;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 2px solid #e5e5e5;
            text-align: left;
        }

        .admin-table td {
            padding: 0.85rem 1rem;
            font-size: 0.9rem;
            color: #333;
            border-bottom: 1px solid #f0f0f0;
        }

        .admin-table tbody tr:hover td {
            background: #fafafa;
        }

        .title-link {
            color: #1a1a1a;
            text-decoration: none;
            font-weight: 500;
        }

        .title-link:hover {
            color: #4f46e5;
            text-decoration: underline;
        }

        .section-badge {
            display: inline-block;
            padding: 0.2rem 0.55rem;
            font-size: 0.75rem;
            font-weight: 600;
            border-radius: 4px;
            background: #f0f0f0;
            color: #555;
        }

        .date-text {
            font-size: 0.82rem;
            color: #999;
        }

        .actions-cell {
            display: flex;
            gap: 0.4rem;
            justify-content: center;
        }

        .btn-icon {
            width: 30px;
            height: 30px;
            border-radius: 6px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #e5e5e5;
            background: #fff;
            color: #888;
            cursor: pointer;
            transition: all 0.15s;
            text-decoration: none;
            font-size: 0.8rem;
        }

        .btn-icon:hover {
            color: #1a1a1a;
            border-color: #ccc;
            background: #f5f5f5;
        }

        .btn-icon-edit:hover {
            color: #d97706;
            border-color: #fbbf24;
            background: #fffbeb;
        }

        .btn-icon-delete:hover {
            color: #dc2626;
            border-color: #fca5a5;
            background: #fef2f2;
        }

        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: #999;
        }

        .empty-state i {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            color: #ccc;
        }

        .empty-state p {
            font-size: 0.95rem;
            margin-bottom: 1.5rem;
        }

        /* 토글 스위치 스타일 */
        .switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 20px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #e5e7eb;
            transition: .3s;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 14px;
            width: 14px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .3s;
        }

        input:checked + .slider {
            background-color: #4f46e5;
        }

        input:checked + .slider:before {
            transform: translateX(20px);
        }

        .slider.round {
            border-radius: 20px;
        }

        .slider.round:before {
            border-radius: 50%;
        }
    </style>

    <div class="page-header">
        <div>
            <div class="page-header type-label"
                 th:text="${currentType.name() == 'NOTICE'} ? 'NOTICE' : (${currentType.name() == 'TERMS'} ? 'TERMS' : 'PRIVACY POLICY')">
                TYPE
            </div>
            <h1 th:text="${currentType.description} + ' 관리'">문서 관리</h1>
        </div>
        <a th:href="@{/admin/documents/new(type=${currentType.name()})}" class="btn btn-primary">
            <i class="fa-solid fa-plus"></i> 새 문서 등록
        </a>
    </div>

    <div class="card">
        <div th:if="${not #lists.isEmpty(documents)}">
            <table class="admin-table">
                <thead>
                    <tr>
                        <th style="width: 60px;">번호</th>
                        <th>대표 제목</th>
                        <th style="width: 100px;">섹션</th>
                        <th style="width: 120px;">적용 여부</th>
                        <th style="width: 160px;">등록일시</th>
                        <th style="width: 160px;">수정일시</th>
                        <th style="width: 160px;">최근 적용일시</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="doc, iterStat : ${documents}">
                        <td class="date-text" th:text="${iterStat.count}">1</td>
                        <td>
                            <a th:href="@{/admin/documents/{id}(id=${doc.id})}" class="title-link" th:text="${doc.title}">
                                공지사항 제목
                            </a>
                        </td>
                        <td>
                            <span class="section-badge" th:text="${doc.sections.size()} + '개'">3개</span>
                        </td>
                        <td>
                            <label class="switch">
                                <input type="checkbox" th:checked="${doc.active}" th:onchange="'toggleActive(' + ${doc.id} + ')'">
                                <span class="slider round"></span>
                            </label>
                        </td>
                        <td class="date-text" th:text="${#temporals.format(doc.createdAt, 'yyyy-MM-dd HH:mm')}">
                            2026-06-10 12:00
                        </td>
                        <td class="date-text" th:text="${#temporals.format(doc.updatedAt, 'yyyy-MM-dd HH:mm')}">
                            2026-06-10 12:00
                        </td>
                        <td class="date-text" th:text="${doc.appliedAt != null} ? ${#temporals.format(doc.appliedAt, 'yyyy-MM-dd HH:mm')} : '-'">
                            -
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="empty-state" th:if="${#lists.isEmpty(documents)}">
            <i class="fa-solid fa-folder-open"></i>
            <p>등록된 문서가 없습니다.</p>
            <a th:href="@{/admin/documents/new(type=${currentType.name()})}" class="btn btn-primary">
                <i class="fa-solid fa-plus"></i> 첫 문서 등록하기
            </a>
        </div>
    </div>

    <script>
        function toggleActive(id) {
            const csrfToken = document.querySelector('meta[name="_csrf"]').getAttribute('content');
            const csrfHeader = document.querySelector('meta[name="_csrf_header"]').getAttribute('content');

            fetch('/admin/documents/' + id + '/toggle-active', {
                method: 'POST',
                headers: {
                    [csrfHeader]: csrfToken
                }
            })
            .then(response => {
                if (response.ok) {
                    location.reload();
                } else {
                    alert('적용 상태 변경에 실패했습니다.');
                    location.reload();
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('적용 상태 변경 중 오류가 발생했습니다.');
                location.reload();
            });
        }

        function moveRowUp(button) {
            const row = button.closest('tr');
            const prevRow = row.previousElementSibling;
            if (prevRow) {
                row.parentNode.insertBefore(row, prevRow);
                saveDocumentsOrder();
            }
        }

        function moveRowDown(button) {
            const row = button.closest('tr');
            const nextRow = row.nextElementSibling;
            if (nextRow) {
                row.parentNode.insertBefore(row, nextRow.nextSibling);
                saveDocumentsOrder();
            }
        }

        function saveDocumentsOrder() {
            const csrfToken = document.querySelector('meta[name="_csrf"]').getAttribute('content');
            const csrfHeader = document.querySelector('meta[name="_csrf_header"]').getAttribute('content');
            const rows = document.querySelectorAll('.admin-table tbody tr');
            const ids = Array.from(rows).map(row => row.getAttribute('data-id'));
            
            fetch('/admin/documents/reorder', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    [csrfHeader]: csrfToken
                },
                body: JSON.stringify(ids)
            })
            .then(response => {
                if (response.ok) {
                    location.reload();
                } else {
                    alert('순서 변경 저장에 실패했습니다.');
                    location.reload();
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('순서 변경 중 오류가 발생했습니다.');
                location.reload();
            });
        }
    </script>
</main>
</body>
</html>
