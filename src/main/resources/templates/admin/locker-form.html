<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{admin/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>물품보관함 수정</title>
</head>
<body>
<main>
    <style>
        .page-header { display: flex; justify-content: space-between; align-items: center; gap: 1rem; margin-bottom: 1.5rem; }
        .page-title { margin: 0; font-size: 1.7rem; color: #111827; }
        .form-shell { background: #fff; border: 1px solid #e5e7eb; padding: 1.5rem; }
        .form-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 1rem; }
        .form-group { display: flex; flex-direction: column; gap: 0.4rem; }
        .form-group.full { grid-column: 1 / -1; }
        .form-label { font-size: 0.86rem; font-weight: 700; color: #374151; }
        .form-control { width: 100%; border: 1px solid #d1d5db; border-radius: 6px; padding: 0.7rem 0.75rem; font-size: 0.95rem; }
        textarea.form-control { min-height: 120px; resize: vertical; }
        .checkbox-row { display: flex; flex-wrap: wrap; gap: 0.75rem; padding-top: 0.3rem; }
        .checkbox-item { display: inline-flex; align-items: center; gap: 0.35rem; color: #374151; }
        .image-upload { border: 1px dashed #cbd5e1; border-radius: 8px; padding: 1rem; background: #fafafa; }
        .image-preview { width: 100%; max-height: 280px; object-fit: contain; border-radius: 8px; border: 1px solid #e5e7eb; background: #fff; margin-bottom: 0.75rem; }
        .image-empty { min-height: 180px; display: flex; align-items: center; justify-content: center; color: #94a3b8; border: 1px dashed #cbd5e1; border-radius: 8px; background: #fff; margin-bottom: 0.75rem; }
        .form-actions { display: flex; justify-content: flex-end; gap: 0.6rem; margin-top: 1.5rem; }
        .field-error { color: #dc2626; font-size: 0.82rem; }
        .global-errors { margin-bottom: 1rem; padding: 0.9rem 1rem; border: 1px solid #fecaca; background: #fef2f2; color: #991b1b; }
        .hint { color: #64748b; font-size: 0.82rem; }
        @media (max-width: 800px) {
            .page-header { align-items: flex-start; flex-direction: column; }
            .form-grid { grid-template-columns: 1fr; }
        }
    </style>

    <div class="page-header">
        <h1 class="page-title">물품보관함 수정</h1>
        <a th:href="@{/admin/lockers}" class="btn btn-secondary">
            <i class="fa-solid fa-arrow-left"></i> 목록
        </a>
    </div>

    <form class="form-shell"
          th:action="@{/admin/lockers/{id}/edit(id=${lockerId})}"
          th:object="${form}"
          method="post"
          enctype="multipart/form-data">
        <div class="global-errors" th:if="${#fields.hasGlobalErrors()}">
            <div th:each="error : ${#fields.globalErrors()}" th:text="${error}">오류</div>
        </div>

        <div class="form-grid">
            <div class="form-group">
                <label class="form-label" for="name">보관함명</label>
                <input id="name" type="text" class="form-control" th:field="*{name}" maxlength="100" required>
                <div class="field-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
            </div>


            <div class="form-group full">
                <label class="form-label" for="roadAddress">도로명 주소</label>
                <input id="roadAddress" type="text" class="form-control" th:field="*{roadAddress}" maxlength="255" required>
                <div class="field-error" th:if="${#fields.hasErrors('roadAddress')}" th:errors="*{roadAddress}"></div>
            </div>

            <div class="form-group">
                <label class="form-label" for="latitude">위도</label>
                <input id="latitude" type="number" step="0.000001" class="form-control" th:field="*{latitude}" required>
                <div class="field-error" th:if="${#fields.hasErrors('latitude')}" th:errors="*{latitude}"></div>
            </div>

            <div class="form-group">
                <label class="form-label" for="longitude">경도</label>
                <input id="longitude" type="number" step="0.000001" class="form-control" th:field="*{longitude}" required>
                <div class="field-error" th:if="${#fields.hasErrors('longitude')}" th:errors="*{longitude}"></div>
            </div>

            <div class="form-group">
                <label class="form-label" for="placeId">연결 장소 ID</label>
                <input id="placeId" type="number" class="form-control" th:field="*{placeId}">
                <div class="hint">기존 장소와 묶을 때만 입력합니다.</div>
            </div>

            <div class="form-group">
                <label class="form-label" for="lockerType">보관함 유형</label>
                <select id="lockerType" class="form-control" th:field="*{lockerType}">
                    <option th:each="type : ${lockerTypes}" th:value="${type.value()}" th:text="${type.label()}"></option>
                </select>
            </div>

            <div class="form-group">
                <label class="form-label" for="indoorOutdoorType">실내/실외</label>
                <select id="indoorOutdoorType" class="form-control" th:field="*{indoorOutdoorType}">
                    <option th:each="type : ${indoorOutdoorTypes}" th:value="${type.value()}" th:text="${type.label()}"></option>
                </select>
            </div>

            <div class="form-group">
                <label class="form-label" for="groundLevelType">지상/지하</label>
                <select id="groundLevelType" class="form-control" th:field="*{groundLevelType}">
                    <option value="">선택 안 함</option>
                    <option th:each="type : ${groundLevelTypes}" th:value="${type.value()}" th:text="${type.label()}"></option>
                </select>
            </div>

            <div class="form-group">
                <label class="form-label" for="floor">층수</label>
                <input id="floor" type="number" class="form-control" th:field="*{floor}">
            </div>

            <div class="form-group">
                <label class="form-label" for="minPrice">최소 요금</label>
                <input id="minPrice" type="number" min="0" class="form-control" th:field="*{minPrice}">
            </div>

            <div class="form-group">
                <label class="form-label" for="maxPrice">최대 요금</label>
                <input id="maxPrice" type="number" min="0" class="form-control" th:field="*{maxPrice}">
            </div>

            <div class="form-group">
                <label class="form-label" for="startTime">운영 시작</label>
                <input id="startTime" type="time" class="form-control" th:field="*{startTime}">
            </div>

            <div class="form-group">
                <label class="form-label" for="endTime">운영 종료</label>
                <input id="endTime" type="time" class="form-control" th:field="*{endTime}">
            </div>

            <div class="form-group full">
                <span class="form-label">보관함 크기</span>
                <div class="checkbox-row">
                    <label class="checkbox-item" th:each="size : ${lockerSizeTypes}">
                        <input type="checkbox" th:field="*{lockerSizes}" th:value="${size.value()}">
                        <span th:text="${size.label()}">SMALL</span>
                    </label>
                </div>
            </div>

            <div class="form-group full">
                <label class="form-label" for="imageFile">보관함 이미지</label>
                <div class="image-upload">
                    <img th:if="*{imageUrl != null}" th:src="*{imageUrl}" class="image-preview" id="imagePreview" alt="현재 보관함 이미지">
                    <div th:unless="*{imageUrl != null}" class="image-empty" id="imageEmpty">
                        <i class="fa-regular fa-image"></i>
                    </div>
                    <input id="imageFile" type="file" class="form-control" th:field="*{imageFile}" accept="image/png,image/jpeg,image/webp">
                    <input type="hidden" th:field="*{imageUrl}">
                    <div class="hint">이미지를 선택하면 저장 시 업로드됩니다. 기존 이미지는 새 파일을 선택하지 않으면 유지됩니다.</div>
                </div>
                <div class="field-error" th:if="${#fields.hasErrors('imageUrl')}" th:errors="*{imageUrl}"></div>
            </div>

            <div class="form-group full">
                <label class="form-label" for="detailInfo">상세 안내</label>
                <textarea id="detailInfo" class="form-control" th:field="*{detailInfo}" maxlength="1000"></textarea>
                <div class="field-error" th:if="${#fields.hasErrors('detailInfo')}" th:errors="*{detailInfo}"></div>
            </div>
        </div>

        <div class="form-actions">
            <a th:href="@{/admin/lockers}" class="btn btn-secondary">취소</a>
            <button type="submit" class="btn btn-primary">
                <i class="fa-solid fa-floppy-disk"></i> 저장
            </button>
        </div>
    </form>

    <script>
        const imageInput = document.getElementById('imageFile');
        imageInput?.addEventListener('change', event => {
            const file = event.target.files?.[0];
            if (!file) return;
            let preview = document.getElementById('imagePreview');
            const empty = document.getElementById('imageEmpty');
            if (!preview) {
                preview = document.createElement('img');
                preview.id = 'imagePreview';
                preview.className = 'image-preview';
                preview.alt = '선택한 보관함 이미지';
                empty?.replaceWith(preview);
            }
            preview.src = URL.createObjectURL(file);
        });
    </script>
</main>
</body>
</html>
