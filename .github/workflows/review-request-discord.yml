name: 디스코드 PR 리뷰 알림

on:
  pull_request:
    types:
      - review_requested

permissions:
  actions: read
  contents: read
  pull-requests: read

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: 디스코드 알림 전송
        uses: actions/github-script@v7
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_BE }}
        with:
          script: |
            const webhookUrl = process.env.DISCORD_WEBHOOK_URL;
            if (!webhookUrl) {
              core.warning('DISCORD_WEBHOOK_BE 시크릿이 없어 알림 전송을 건너뜁니다.');
              return;
            }

            const pr = context.payload.pull_request;
            const reviewer = context.payload.requested_reviewer;
            const mapping = {
              'buddle031': '944930352047226931',
              'mike7643': '469791913050898443'
            };

            const mention = reviewer
              ? (mapping[reviewer.login] ? `<@${mapping[reviewer.login]}>` : `**@${reviewer.login}**`)
              : null;
            const reviewRequestText = mention
              ? `🔔 ${mention} 님에게 PR 리뷰 요청이 왔습니다.`
              : '🔔 PR 리뷰 요청이 왔습니다.';

            const message = {
              username: '📢짐두고 백엔드 PR 알리미',
              content: reviewRequestText,
              embeds: [{
                title: `PR #${pr.number}\n[ ${pr.title} ]`,
                description: pr.body?.trim() || '_PR 설명이 없습니다._',
                url: pr.html_url,
                color: 0x2EAF83,
                fields: [
                  { name: '작성자', value: `📝 **@${pr.user.login}**`, inline: false },
                  { name: '브랜치', value: `\`${pr.head.ref}\` → \`${pr.base.ref}\``, inline: true },
                ],
              }]
            };

            const res = await fetch(webhookUrl, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(message)
            });

            if (!res.ok) {
              const text = await res.text();
              core.setFailed(`디스코드 웹훅 호출 실패 (${res.status}): ${text}`);
            }
