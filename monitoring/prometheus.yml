global:
  scrape_interval: 15s # 메트릭을 긁어올 주기 (기본 15초)

scrape_configs:
  - job_name: 'zimdugo-prod-server'
    metrics_path: '/actuator/prometheus'
    # 배포 환경의 URL 스키마에 따라 https 또는 http로 설정합니다.
    scheme: https
    
    # 스프링 부트 시큐리티에 적용한 Basic Auth 인증 정보
    basic_auth:
      username: 'YOUR_ADMIN_ID'
      password: 'YOUR_ADMIN_PASSWORD'

    static_configs:
      # 운영 서버의 호스트(도메인 또는 IP)를 적어줍니다. 
      # (https인 경우 포트 443을 명시해 주어야 할 수 있습니다. 예: targets: ['api.zimdugo.com:443'])
      - targets: ['api.zimdugo.com:443']
